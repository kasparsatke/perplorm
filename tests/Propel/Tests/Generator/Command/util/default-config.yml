propel:
    database:
        connections:
            default:
                adapter: pgsql
                dsn: 'pgsql:host=localhost;port=5432;dbname=le db'
                user: 'le user'
                password: 'le password'
                settings:
                    charset: utf8
    paths:
        projectDir: __DIR__/..
        phpDir: __DIR__/../src
        schemaDir: __DIR__/schema
        phpConfDir: __DIR__/generated-conf
        sqlDir: __DIR__/generated-sql
        migrationDir: __DIR__/generated-migrations
    generator:
        declareStrictTypesInBuilders: true
        dateTime:
            dateTimeClass: \DateTimeImmutable
